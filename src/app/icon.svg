<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#4F46E5"/>
  <!-- Antenna -->
  <line x1="16" y1="6" x2="16" y2="10" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <circle cx="16" cy="5.5" r="1.5" fill="white"/>
  <!-- Robot head -->
  <rect x="9" y="10" width="14" height="12" rx="3" fill="none" stroke="white" stroke-width="2.2"/>
  <!-- Eyes -->
  <circle cx="13" cy="15.5" r="1.8" fill="white"/>
  <circle cx="19" cy="15.5" r="1.8" fill="white"/>
  <!-- Mouth -->
  <line x1="12.5" y1="19.5" x2="19.5" y2="19.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Ear antennas -->
  <line x1="7" y1="14" x2="9" y2="14" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="23" y1="14" x2="25" y2="14" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Neck/body hint -->
  <line x1="13" y1="22" x2="13" y2="25" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="19" y1="22" x2="19" y2="25" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="12" y1="25" x2="20" y2="25" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
</svg>
